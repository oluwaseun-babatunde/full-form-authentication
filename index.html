<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
</head>
<body class="flex justify-center items-center bg-blue-500 min-h-screen">
 
    <form class=" shadow-lg m-auto p-10 rounded-2xl backdrop-blur-lg backdrop-blur-md">
        <h4 class="text-center text-white font-bold mb-4 text-[20px]">Sign Up</h4>
        
        <div class="flex  ">
        <label for="">First Name</label>
         <input type="text" placeholder="Enter first name" class="p-2 rounded-2xl">
        </div>

        <div class="">
                <label for="">Last Name</label>
         <input type="text" placeholder="Enter Last name">
        </div>

        <div class="">
        <label for="">Email</label>
         <input type="text" placeholder="Enter Email">
        </div>

        <div class="">
        <label for="">Phone Number</label>
         <input type="text" placeholder="Enter Phone Number">
        </div>

        <div class="">
            <label for="">Username</label>
         <input type="text" placeholder="Enter Username">
        </div>

        <div class="">
            <label for="">Password</label>
            <input type="text" placeholder="password">
        </div>

        <div>
            <label for="">Countries</label>
                <select name="" id="">
                    <optgroup label="Africa">
                        <option value="">Togo</option>
                        <option value="">Congo</option>
                        <option value="">Egypt</option>
                        <option value="">Cameroon</option>
                        </optgroup>

                          <optgroup label="Asia">
                        <option value="">iran</option>
                        <option value="">iraq</option>
                        <option value="">china</option>
                        <option value="">India</option>
                        </optgroup>
                </select>


        <div>
            <h4>Select your Gender</h4>
            <label for="">Male</label>
            <input type="radio">

            <label for="">Female</label>
            <input type="radio">
        </div>

        <div>
            <label for="">Language preference</label>
        <select name="" id="Language preference">
                    <optgroup label="">
                        <option value="">English</option>
                        <option value="">Spanish</option>
                        <option value="">Chinese</option>
                        <option value="">Yoruba</option>
                        </optgroup>
                </select>
        </div>

        <input type="file" multiple>

    </form>
</body>
</html>
