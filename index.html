<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
</head>
<body class="flex justify-center items-center bg-blue-500 min-h-screen bg-gradient-to-r from-blue-500 to-red-500">
     
    <form class="bg-blue-400 shadow-lg m-auto p-10 rounded-2xl my-12">
        <h4 class="text-center text-white font-bold mb-4 text-[20px]">Sign Up</h4>
        <div class=" flex flex-col space-y-8">
        <div class=" flex flex-col">
        <label for=" rounded-2xl mb-2">First Name</label>
         <input type="text" placeholder="Enter first name" class="p-2 rounded-2xl">
        </div>
          
        <div class=" flex flex-col">
                <label for="rounded-2xl">Last Name</label>
         <input type="text" placeholder="Enter Last name" class="p-2 rounded-2xl">
        </div>

        <div class="flex flex-col">
        <label for="" class="rounded-2xl">Email</label>
         <input type="text" placeholder="Enter Email" class=" p-2 rounded-2xl">
        </div>

        <div class="flex flex-col">
        <label for="rounded-2xl">Phone Number</label>
         <input type="text" placeholder="Enter Phone Number" class=" p-2 rounded-2xl">
        </div>

        <div class="flex flex-col">
            <label for="rounded-2xl">Username</label>
         <input type="text" placeholder="Enter Username" class=" p-2 rounded-2xl">
        </div>

        <div class="flex flex-col">
            <label for="rounded-2xl">Password</label>
            <input type="text" placeholder="password" class=" p-2 rounded-2xl">
        </div>

        
            <label for="rounded-2xl">Countries</label>
                <select name="flex flex-col" id=" p-2 rounded-2xl">
                    <optgroup label="Africa">
                        <option value="">Togo</option>
                        <option value="">Congo</option>
                        <option value="">Egypt</option>
                        <option value="">Cameroon</option>
                        </optgroup>

                          <optgroup label="Asia">
                        <option value="">iran</option>
                        <option value="">iraq</option>
                        <option value="">china</option>
                        <option value="">India</option>
                        </optgroup>
                </select>


        <div>
            <h4>Select your Gender</h4>
            <label for="">Male</label>
            <input type="radio">

            <label for="">Female</label>
            <input type="radio">
        </div>

        <div>
            <label for="rounded-2xl">Language preference</label>
        <select name="p-2 rounded-2xl" id="Language preference">
                    <optgroup label="">
                        <option value="">English</option>
                        <option value="">Spanish</option>
                        <option value="">Chinese</option>
                        <option value="">Yoruba</option>
                        </optgroup>
                </select>
        </div>
          
        <input type="file" multiple>
        

        </div>
    </form>
    </div>
</body>
</html>
